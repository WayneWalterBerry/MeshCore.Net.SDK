# Build and Release Workflow
#
# This workflow automatically builds, tests, and releases the MeshCore.Net.SDK
#
# 🚀 HOW TO CREATE A RELEASE:
#
# 1. Ensure all changes are merged to main branch
# 2. Update the version in CHANGELOG.md with release notes
# 3. Create and push a version tag (format: v1.2.3):
#    
#    git tag v1.2.3
#    git push origin v1.2.3
#
# 4. The workflow will automatically:
#    - Build and test the solution
#    - Create a NuGet package with the version from the tag
#    - Create a GitHub release with the tag
#    - Publish the package to NuGet.org (if NUGET_API_KEY secret is configured)
#
# 📋 WORKFLOW TRIGGERS:
# - Push to main: Builds and runs tests, creates CI packages
# - Pull requests: Builds and runs tests only
# - Version tags (v*): Full release process (build, test, pack, release, publish)
#
# 💡 NOTES:
# - Use semantic versioning (e.g., v1.0.0, v2.1.3, v1.0.0-beta.1)
# - Pre-release versions can use suffixes: v1.0.0-alpha, v1.0.0-rc.1
# - The "v" prefix is REQUIRED for the tag to trigger the release workflow
# - CI builds on main use version format: 1.0.0-ci.{run_number}
#
# ✅ CRITICAL (automatic):
# - Build and test execution
# - NuGet package creation
# - GitHub release creation
#
# 🔧 OPTIONAL (requires configuration):
# - NuGet.org publishing (only if NUGET_API_KEY secret is configured in repository settings)
# - If the secret is not set, the package will still be attached to the GitHub release

name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for GitVersion
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build solution
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests (excluding hardware-dependent tests)
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --filter "Category!=LiveRadio"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/TestResults/**/*.xml
          **/TestResults/**/*.trx
    
    - name: Upload code coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: '**/TestResults/**/coverage.cobertura.xml'
        fail_ci_if_error: false

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Determine version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT
        else
          VERSION="1.0.0-ci.$GITHUB_RUN_NUMBER"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=true" >> $GITHUB_OUTPUT
        fi
        echo "Building version: $VERSION"
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build and pack
      run: |
        dotnet build --configuration Release --no-restore
        dotnet pack MeshCore.Net.SDK/MeshCore.Net.SDK.csproj \
          --configuration Release \
          --no-build \
          --output ./artifacts \
          /p:Version=${{ steps.version.outputs.version }} \
          /p:PackageVersion=${{ steps.version.outputs.version }}
    
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg

  release:
    runs-on: ubuntu-latest
    needs: [build, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts
    
    - name: Determine version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.version.outputs.version }}
        body: |
          ## MeshCore.Net.SDK ${{ steps.version.outputs.version }}
          
          ### 🚀 Features
          - Complete C# SDK for MeshCore devices
          - USB serial protocol implementation
          - Async/await support with modern C# patterns
          - Real-time event notifications
          - Cross-platform compatibility (.NET 8)
          
          ### 📦 Installation
          ```bash
          dotnet add package MeshCore.Net.SDK --version ${{ steps.version.outputs.version }}
          ```
          
          ### 🚀 Quick Start
          ```csharp
          using MeshCore.Net.SDK;
          
          var devices = await MeshCoreClient.DiscoverDevicesAsync();
          using var client = await MeshCoreClient.ConnectAsync(devices[0]);
          
          var deviceInfo = await client.GetDeviceInfoAsync();
          Console.WriteLine($"Connected to: {deviceInfo.DeviceId}");
          ```
          
          ### 📝 What's Changed
          - See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for detailed changes
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.version.outputs.version }}...main
        files: |
          ./artifacts/*.nupkg
        draft: false
        prerelease: false
        generate_release_notes: true
    
    - name: Publish to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate
      if: env.NUGET_API_KEY != ''
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  demo:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build demo
      run: dotnet build MeshCore.Net.SDK.Demo/MeshCore.Net.SDK.Demo.csproj --configuration Release
    
    - name: Test demo compilation
      run: |
        echo "Testing demo application compilation on ${{ matrix.os }}"
        dotnet build MeshCore.Net.SDK.Demo/MeshCore.Net.SDK.Demo.csproj --configuration Release --verbosity normal